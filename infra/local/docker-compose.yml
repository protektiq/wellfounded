services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: wellfounded
      POSTGRES_PASSWORD: wellfounded
      POSTGRES_DB: wellfounded
    # Host ports avoid clashing with other local Postgres instances (container still uses 5432).
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellfounded -d wellfounded"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done;
      mc mb local/wellfounded-dev --ignore-existing;
      exit 0;
      "

  redis:
    image: redis:7
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data:

# Pin default network settings so Docker Desktop updates do not force manual network
# recreation ("enable_ipv4/enable_ipv6 has changed"). Recovery: make up-fresh
networks:
  default:
    driver: bridge
    enable_ipv6: false
